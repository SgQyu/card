<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>김태헌 — 웹 명함</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="glow glow-1" aria-hidden="true"></div>
    <div class="glow glow-2" aria-hidden="true"></div>

    <main class="card" id="card">
      <div class="card__shine" aria-hidden="true"></div>

      <header class="card__header">
        <div class="avatar" role="img" aria-label="김태헌 캐릭터 초상 일러스트">
          <svg viewBox="0 0 200 230" xmlns="http://www.w3.org/2000/svg" class="avatar__svg" aria-hidden="true">
            <defs>
              <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#1a1530" stop-opacity="0.92" />
                <stop offset="45%" stop-color="#0d3a4a" stop-opacity="0.85" />
                <stop offset="100%" stop-color="#2a1f4a" stop-opacity="0.9" />
              </linearGradient>
              <linearGradient id="hairShine" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#0a0a10" />
                <stop offset="35%" stop-color="#1e2438" />
                <stop offset="55%" stop-color="#2a3350" />
                <stop offset="100%" stop-color="#0c0c14" />
              </linearGradient>
              <linearGradient id="frameMetal" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#e8ecf5" />
                <stop offset="50%" stop-color="#9aa3b8" />
                <stop offset="100%" stop-color="#5c6578" />
              </linearGradient>
            </defs>
            <!-- suit shoulders -->
            <path d="M 20 210 L 40 165 L 160 165 L 180 210 Z" fill="#12141c" />
            <path d="M 55 168 L 100 198 L 145 168 Z" fill="#f2f4fa" />
            <!-- neck -->
            <path d="M 78 168 L 78 142 L 122 142 L 122 168 Z" fill="#c9a088" />
            <!-- hair volume back -->
            <path
              d="M 34 118 C 28 70 52 32 100 28 C 148 32 172 70 166 118 C 168 88 140 58 100 54 C 60 58 32 88 34 118 Z"
              fill="url(#hairShine)"
            />
            <!-- face -->
            <path
              d="M 100 52 C 138 52 158 82 160 118 C 162 148 148 172 128 178 C 115 184 85 184 72 178 C 52 172 38 148 40 118 C 42 82 62 52 100 52 Z"
              fill="#deb39a"
            />
            <!-- ear L -->
            <ellipse cx="44" cy="118" rx="11" ry="15" fill="#d4a990" />
            <path d="M 40 112 Q 44 118 40 124" stroke="#b88870" stroke-width="1.2" fill="none" opacity="0.5" />
            <!-- ear R -->
            <ellipse cx="156" cy="118" rx="11" ry="15" fill="#d4a990" />
            <path d="M 160 112 Q 156 118 160 124" stroke="#b88870" stroke-width="1.2" fill="none" opacity="0.5" />
            <!-- jaw shadow -->
            <ellipse cx="100" cy="158" rx="38" ry="14" fill="#000" opacity="0.12" />
            <!-- cheekbone light -->
            <ellipse cx="72" cy="124" rx="16" ry="10" fill="#fff" opacity="0.08" />
            <ellipse cx="128" cy="124" rx="16" ry="10" fill="#fff" opacity="0.08" />
            <!-- hair top / slicked (behind glasses) -->
            <path
              d="M 38 96 C 48 48 152 48 162 96 C 150 72 128 58 100 56 C 72 58 50 72 38 96 Z"
              fill="url(#hairShine)"
            />
            <path
              d="M 52 70 Q 100 52 148 70"
              fill="none"
              stroke="#ffffff"
              stroke-opacity="0.12"
              stroke-width="3"
              stroke-linecap="round"
            />
            <!-- sunglasses frame -->
            <rect x="48" y="96" width="48" height="30" rx="10" fill="none" stroke="url(#frameMetal)" stroke-width="4" />
            <rect x="104" y="96" width="48" height="30" rx="10" fill="none" stroke="url(#frameMetal)" stroke-width="4" />
            <path d="M 96 111 H 104" stroke="url(#frameMetal)" stroke-width="4" stroke-linecap="round" />
            <path d="M 44 104 L 36 100" stroke="url(#frameMetal)" stroke-width="3" stroke-linecap="round" />
            <path d="M 156 104 L 164 100" stroke="url(#frameMetal)" stroke-width="3" stroke-linecap="round" />
            <!-- lenses -->
            <rect x="52" y="100" width="40" height="22" rx="8" fill="url(#lens)" />
            <rect x="108" y="100" width="40" height="22" rx="8" fill="url(#lens)" />
            <!-- lens glint -->
            <path d="M 58 104 L 72 108 L 64 114 Z" fill="#fff" opacity="0.35" />
            <path d="M 114 104 L 128 108 L 120 114 Z" fill="#fff" opacity="0.35" />
            <!-- confident smirk -->
            <path
              d="M 82 154 C 92 162 112 158 122 150"
              fill="none"
              stroke="#9a5c4a"
              stroke-width="3"
              stroke-linecap="round"
            />
          </svg>
        </div>
        <div class="card__titles">
          <p class="eyebrow">Web Business Card</p>
          <h1 class="name">김태헌</h1>
          <p class="role">SideOnAI대표</p>
        </div>
      </header>

      <p class="tagline">AI와 함께 놀고 있습니다. 같이 노실 분?</p>

      <ul class="contacts" role="list">
        <li>
          <a class="contact" href="mailto:th@sideonai.com">
            <span class="contact__label">이메일</span>
            <span class="contact__value">th@sideonai.com</span>
          </a>
        </li>
        <li>
          <a class="contact" href="tel:01011111111">
            <span class="contact__label">전화</span>
            <span class="contact__value">010-1111-1111</span>
          </a>
        </li>
        <li class="contacts__social">
          <div class="contacts__social-row">
            <a
              class="btn-linkedin"
              href="https://www.linkedin.com/"
              target="_blank"
              rel="noopener noreferrer"
            >
              <svg class="btn-linkedin__icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  fill="currentColor"
                  d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"
                />
              </svg>
              LinkedIn
            </a>
            <a
              class="btn-youtube"
              href="https://www.youtube.com/@ai-study"
              target="_blank"
              rel="noopener noreferrer"
            >
              <svg class="btn-youtube__icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  fill="currentColor"
                  d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"
                />
              </svg>
              YouTube
            </a>
          </div>
        </li>
      </ul>
    </main>

    <script src="script.js"></script>
  </body>
</html>
